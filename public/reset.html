<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resetting VELA…</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      background: #0b0b1e; color: #f0ead6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      text-align: center;
    }
    .box { padding: 2rem; max-width: 320px; }
    .spinner {
      width: 32px; height: 32px; margin: 0 auto 1rem;
      border: 3px solid rgba(212,168,75,0.15); border-top-color: #d4a84b;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 0.9rem; color: #7a7a96; margin: 0.5rem 0 0; }
    h1 { font-size: 1.1rem; margin: 0; }
    a { color: #d4a84b; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h1>Clearing cached data…</h1>
    <p id="msg">Removing old service worker and cache, then reloading VELA.</p>
  </div>
  <script>
    (async () => {
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations()
          await Promise.all(regs.map(r => r.unregister()))
        }
        if ('caches' in window) {
          const keys = await caches.keys()
          await Promise.all(keys.map(k => caches.delete(k)))
        }
      } catch (e) {
        document.getElementById('msg').textContent = 'Could not fully clear cache automatically — please also clear site data manually in your browser settings.'
      } finally {
        setTimeout(() => { location.href = '/' }, 600)
      }
    })()
  </script>
  <noscript>JavaScript is required to reset VELA. Please enable it, or clear site data manually in your browser settings, then visit <a href="/">vela.co.zw</a>.</noscript>
</body>
</html>
